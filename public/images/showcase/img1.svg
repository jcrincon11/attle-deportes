<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg" width="600" height="800">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4D0000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <pattern id="grid1" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CC0000" stroke-width="0.5" stroke-opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#bg1)"/>
  <rect width="600" height="800" fill="url(#grid1)"/>
  <!-- Diagonal accent lines -->
  <line x1="-100" y1="200" x2="700" y2="600" stroke="#CC0000" stroke-width="1" stroke-opacity="0.12"/>
  <line x1="-100" y1="350" x2="700" y2="750" stroke="#CC0000" stroke-width="1" stroke-opacity="0.08"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="160" height="3" fill="#CC0000"/>
  <!-- Corner marks -->
  <path d="M0 0 L40 0 M0 0 L0 40" stroke="#CC0000" stroke-width="2" fill="none"/>
  <path d="M560 0 L600 0 L600 40" stroke="#CC0000" stroke-width="2" fill="none"/>
  <path d="M0 760 L0 800 L40 800" stroke="#CC0000" stroke-width="2" fill="none"/>
  <path d="M560 800 L600 800 L600 760" stroke="#CC0000" stroke-width="2" fill="none"/>
  <!-- Watermark big number -->
  <text x="300" y="440" font-family="Arial Black,Impact,sans-serif" font-size="300" fill="#CC0000" fill-opacity="0.06" text-anchor="middle" dominant-baseline="middle" font-weight="900">1</text>
  <!-- IMG label -->
  <text x="300" y="360" font-family="Arial Black,Impact,sans-serif" font-size="90" fill="#CC0000" fill-opacity="0.9" text-anchor="middle" dominant-baseline="middle" font-weight="900" letter-spacing="4">IMG 1</text>
  <!-- Category -->
  <text x="300" y="430" font-family="Arial,sans-serif" font-size="18" fill="#ffffff" fill-opacity="0.45" text-anchor="middle" letter-spacing="10">FÚTBOL</text>
  <!-- Bottom label bar -->
  <rect x="0" y="730" width="600" height="70" fill="#0a0a0a" fill-opacity="0.75"/>
  <text x="32" y="758" font-family="Arial Black,sans-serif" font-size="11" fill="#CC0000" fill-opacity="0.7" letter-spacing="3">CLUBES FPC</text>
  <text x="32" y="780" font-family="Arial,sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.35" letter-spacing="2">public/images/showcase/img1.svg</text>
</svg>
